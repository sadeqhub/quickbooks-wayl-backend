"on":
    push:
        branches:
            - main
name: Deploy to quickbooks-wayl-backend
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: quickbooks-wayl-backend
                PORTER_CLUSTER: "4188"
                PORTER_DEPLOYMENT_TARGET_ID: 3febee06-c720-4c74-8c52-c6eb6726150e
                PORTER_HOST: https://dashboard.porter.run
                PORTER_PROJECT: "12884"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_12884_1171972305 }}
